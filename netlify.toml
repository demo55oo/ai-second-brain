# Netlify — Next.js AI Brain (API engine, no Claude CLI)
# Docs: https://docs.netlify.com/frameworks/next-js/overview/

[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "22"
  # Default — users never need to set this in the UI
  BRAIN_ENGINE = "api"
  AI_MODEL = "anthropic/claude-sonnet-4-6"

# Runtime too (not only build)
[context.production.environment]
  BRAIN_ENGINE = "api"
  AI_MODEL = "anthropic/claude-sonnet-4-6"

[context.deploy-preview.environment]
  BRAIN_ENGINE = "api"
  AI_MODEL = "anthropic/claude-sonnet-4-6"

# Next.js runtime plugin (required for App Router on Netlify)
[[plugins]]
  package = "@netlify/plugin-nextjs"

[functions]
  node_bundler = "esbuild"
  included_files = ["content/knowledge/**"]

# Only secret the user must add after deploy:
#   AI_GATEWAY_API_KEY   (or ANTHROPIC_API_KEY)
# Optional cloud vault:
#   NEXT_PUBLIC_SUPABASE_URL / NEXT_PUBLIC_SUPABASE_ANON_KEY / SUPABASE_SERVICE_ROLE_KEY
